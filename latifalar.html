 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Латифалар тўплами — Искандар Хамроқулов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            background-image: url('log.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            font-family: 'Georgia', serif;
            color: #fff;
        }

        header {
            background: var(--dark-bg);
            border-bottom: 2px solid var(--gold);
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { margin: 0; color: var(--gold); font-size: 22px; text-transform: uppercase; }

        .back-link {
            position: absolute; left: 15px; top: 18px;
            color: var(--gold); text-decoration: none; font-size: 14px;
            border: 1px solid var(--gold); padding: 4px 10px; border-radius: 5px;
        }

        .wrapper {
            display: flex;
            max-width: 1200px;
            margin: 30px auto;
            gap: 20px;
            padding: 0 15px;
        }

        .main-content {
            flex: 3;
            background: var(--dark-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            min-height: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sidebar {
            flex: 1;
            background: var(--dark-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .sidebar h3 {
            color: var(--gold);
            font-size: 18px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            text-align: center;
        }

        .list-group { list-style: none; padding: 0; margin-top: 15px; }
        .list-group li { margin-bottom: 10px; }
        .list-group a {
            color: #ccc; text-decoration: none; font-size: 15px;
            display: block; padding: 8px 10px; border-radius: 5px; transition: 0.3s;
        }
        .list-group a:hover { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding-left: 15px; }

        .latifa-display h2 { color: var(--gold); border-bottom: 1px dashed var(--gold); padding-bottom: 10px; }
        .latifa-text { font-size: 19px; line-height: 1.7; white-space: pre-line; margin: 20px 0; }

        /* ВИДЕОНИ КИЧРАЙТИРИШ ВА ЎРТАГА ОЛИШ */
        .video-box {
            margin: 20px auto;
            width: 70%; /* Видео кенглиги энди 70% */
            position: relative;
            padding-bottom: 39.37%; /* Нисбатни ҳам кичрайтирдик */
            height: 0;
            overflow: hidden;
            border: 2px solid var(--gold);
            border-radius: 15px;
        }
        
        .video-box iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        @media (max-width: 850px) {
            .wrapper { flex-direction: column; }
            .sidebar { order: -1; position: static; }
            .main-content { padding: 20px; }
            .video-box { width: 100%; padding-bottom: 56.25%; } /* Телфонда тўлиқ кўринади */
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Ортга</a>
    <h1>ЛАТИФАЛАР ВА ВИДЕОЛАР</h1>
</header>

<div class="wrapper">
    <main class="main-content" id="display-area">
        <div class="latifa-display">
            <h2 id="l-title">Искандар Хамроқулов видео латифалари</h2>
            <div class="latifa-text" id="l-body">
                Энг сара видео чиқишлар тўплами:
            </div>
            
            <div class="video-box" style="display: block;">

            </div>

            <div class="video-box" style="display: block;">
                <iframe src="https://www.youtube.com/embed/fkAyXEQzMxk?rel=0" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="video-box" style="display: block; margin-bottom: 20px;">
    <iframe src="https://www.youtube.com/embed/Yl2FAly9bw8?si=4lG3rkjre37-360C frameborder="0" allowfullscreen></iframe>

<div class="video-box" style="display: block; margin-bottom: 20px;">

<div class="video-box" style="display: block; margin-bottom: 20px;">

<div class="video-box" style="display: block; margin-bottom: 20px;">
    <iframe src="https://www.youtube.com/embed/_lp6ntrDDzM?si=dwAFpblQLvU-0NQW" frameborder="0" allowfullscreen></iframe>

<div class="video-box" style="display: block; margin-bottom: 20px;">

</div>
    </main>

    <aside class="sidebar">
        <h3><i class="fas fa-laugh"></i> Рўйхат</h3>
        <ul class="list-group">
            <li><a href="javascript:void(0)" onclick="loadItem('Наманганча пайров', 'Бу видеода Наманган аҳлининг ширин суҳбати ва аскияларини томоша қилишингиз мумкин.', 'nkdywdexzf3uv')">📽 Видео Латифа</a></li>
            <li><a href="javascript:void(0)" onclick="loadItem('Афанди ва бой', 'Бой Афандига дебди:\n— Агар мени кулдирсанг, бир тилла бераман.\nАфанди:\n— Бой ота, ҳозир вақтим йўқ, тиллани бериб туринг, эртага келиб икки марта кулдираман!', null)">📖 Афанди ва бой</a></li>
            <li><a href="javascript:void(0)" onclick="loadItem('Таксидаги гурунг', 'Бир одам таксига чиқиб, ҳайдовчига:\n— Ака, радиода Искандар қизиқчи чиқяптими, овозини баландроқ қилинг, маза қилайлик, — дебди.', null)">📖 Таксидаги ҳазил</a></li>
        </ul>
    </aside>
</div>

<script>
    function loadItem(title, body, youtubeId) {
        document.getElementById('l-title').innerText = title;
        document.getElementById('l-body').innerText = body;

        // Биринчи видеони алмаштириш учун (агар керак бўлса)
        const firstVideo = document.querySelector('.video-box iframe');
        if (youtubeId && youtubeId.length > 5) {
            firstVideo.src = "https://www.youtube.com/embed/" + youtubeId + "?rel=0&modestbranding=1";
        }
        
        if(window.innerWidth < 850) {
            document.getElementById('display-area').scrollIntoView({behavior: 'smooth'});
        }
    }
</script>

</body>
</html>
