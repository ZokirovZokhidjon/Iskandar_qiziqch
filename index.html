<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-image: url('log.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Марказий карточка */
        .main-card {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #ffd700;
            padding: 40px;
            text-align: center;
            margin-top: 50px;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
        }

        /* Думалоқ расм */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h2 { color: #ffd700; margin-bottom: 5px; }

        /* Навигация менюси */
        .nav-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            position: relative;
        }

        .gold-btn {
            background: linear-gradient(145deg, #d4af37, #f9d423);
            border: 1px solid #ffd700;
            color: #000;
            padding: 12px 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-size: 13px;
            display: inline-block;
        }

        .gold-btn:hover {
            box-shadow: 0 0 20px #ffd700;
            transform: scale(1.05);
        }

        /* Алоқа тугмаси (қизил неон) */
        .contact-btn {
            background: #000;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }

        /* Dropdown - Халақит бермайдиган қилиб созланди */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            min-width: 180px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            z-index: 100;
            top: 100%; /* Тугманинг тагидан бошланади */
            left: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #ffd700;
            padding: 12px 15px;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #333;
            text-align: left;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background: #ffd700;
            color: #000;
        }

        /* Радио Карточкаси (Искандар Қизиқчи) */
        .radio-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            margin: 40px 0;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        audio {
            width: 100%;
            height: 35px;
            filter: sepia(100%) saturate(200%) hue-rotate(15deg);
            margin-top: 10px;
        }

        .live-tag {
            color: #ff4d4d;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        .dot {
            width: 8px; height: 8px; background: red; border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>

    </div>

    <div class="radio-card">
        <i class="fas fa-radio" style="font-size: 30px; color: #ffd700;"></i>
        <div style="color: #ffd700; font-weight: bold; margin: 10px 0;">"ИСКАНДАР ҚИЗИҚЧИ" РАДИОСИ</div>
